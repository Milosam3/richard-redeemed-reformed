<!DOCTYPE html>
<html>
<head>
<style>
body { background: #111; display: flex; gap: 40px; padding: 40px; flex-wrap: wrap; }
.card { background: #1a1a1a; border: 1px solid #333; padding: 30px; border-radius: 8px; text-align: center; }
p { color: #666; font-family: Georgia; font-size: 12px; margin-top: 16px; }
</style>
</head>
<body>

<div class="card">
<svg width="160" height="100" viewBox="0 0 160 100">
  <line x1="30" y1="15" x2="30" y2="70" stroke="#d4d0c8" stroke-width="2.5"/>
  <line x1="14" y1="32" x2="46" y2="32" stroke="#d4d0c8" stroke-width="2.5"/>
  <text x="55" y="35" font-family="Georgia" font-size="13" fill="#e8e4dc">Richard</text>
  <text x="55" y="52" font-family="Georgia" font-size="13" fill="#e8e4dc">Redeemed</text>
  <text x="55" y="69" font-family="Georgia" font-size="13" fill="#e8e4dc">Reformed</text>
</svg>
<p>A — Cross</p>
</div>

<div class="card">
<svg width="160" height="100" viewBox="0 0 160 100">
  <polygon points="30,80 48,20 66,80" stroke="#d4d0c8" stroke-width="2" fill="none"/>
  <line x1="30" y1="80" x2="66" y2="80" stroke="#d4d0c8" stroke-width="2"/>
  <text x="78" y="35" font-family="Georgia" font-size="13" fill="#e8e4dc">Richard</text>
  <text x="78" y="52" font-family="Georgia" font-size="13" fill="#e8e4dc">Redeemed</text>
  <text x="78" y="69" font-family="Georgia" font-size="13" fill="#e8e4dc">Reformed</text>
</svg>
<p>B — Flame</p>
</div>

<div class="card">
<svg width="160" height="100" viewBox="0 0 160 100">
  <rect x="14" y="15" width="34" height="46" rx="2" stroke="#d4d0c8" stroke-width="2" fill="none"/>
  <line x1="14" y1="28" x2="48" y2="28" stroke="#d4d0c8" stroke-width="1.5"/>
  <line x1="20" y1="38" x2="42" y2="38" stroke="#d4d0c8" stroke-width="1"/>
  <line x1="20" y1="47" x2="42" y2="47" stroke="#d4d0c8" stroke-width="1"/>
  <line x1="20" y1="56" x2="36" y2="56" stroke="#d4d0c8" stroke-width="1"/>
  <text x="58" y="35" font-family="Georgia" font-size="13" fill="#e8e4dc">Richard</text>
  <text x="58" y="52" font-family="Georgia" font-size="13" fill="#e8e4dc">Redeemed</text>
  <text x="58" y="69" font-family="Georgia" font-size="13" fill="#e8e4dc">Reformed</text>
</svg>
<p>C — Bible</p>
</div>

<div class="card">
<svg width="100" height="100" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="38" stroke="#d4d0c8" stroke-width="1.5" fill="none"/>
  <line x1="50" y1="16" x2="50" y2="84" stroke="#d4d0c8" stroke-width="2.5"/>
  <line x1="16" y1="50" x2="84" y2="50" stroke="#d4d0c8" stroke-width="2.5"/>
</svg>
<p>D — Circle cross</p>
</div>

</body>
</html>
