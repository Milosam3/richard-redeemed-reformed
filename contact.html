<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="site">

  <nav>
    <span class="nav-brand">Richard Redeemed Reformed</span>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="writing.html">Writing</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <h1 class="page-title">Get in touch</h1>
  <div class="page-body">
    <p>If something I&rsquo;ve written resonated with
you, or you&rsquo;d like to start a conversation,
I&rsquo;d genuinely love to hear from you.</p>
  </div>

  <div class="contact-form">
    <form action="https://formspree.io/f/YOUR_FORM_ID"
          method="POST">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea name="message" required></textarea>
      </div>
      <button type="submit">Send message</button>
    </form>
  </div>

  <div class="footer">
    &copy; 2026 Richard Redeemed Reformed
  </div>

</div>
</body>
</html>
